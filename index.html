<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jellyfish Survival</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HUD -->
    <div id="ui">

    <div>
        SCORE:
        <span id="score">0</span>
    </div>

    <div>
        LEVEL:
        <span id="level">1</span>
    </div>

    <div>
        ❤️
        <span id="lives">3 / 3</span>
    </div>

    <div>
        ⚡
        <span id="energy">0 / 100</span>
    </div>

    <div>
        💎
        <span id="diamonds">0</span>
    </div>

    <div>
        🏆
        <span id="trophies">0</span>
    </div>

    <div>
        🛡️
        <span id="shield">OFF</span>
    </div>

</div>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Scripts -->
    <script type="module" src="./js/game.js"></script>

</body>
</html>
